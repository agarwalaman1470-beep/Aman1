<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdant Focus</title>
    <meta
      name="description"
      content="A premium focus timer that grows a living world while you stay locked in."
    />
    <meta name="theme-color" content="#1E79D9" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />

    <script>
      (function setInitialTheme() {
        const STORAGE_KEY = "verdant-focus-lab:v1";
        let theme = "dark";

        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          if (saved && saved.settings && saved.settings.theme === "light") {
            theme = "light";
          }
        } catch (error) {
          console.error("Error reading theme from localStorage:", error);
          theme = "dark";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>

  </head>
  <body>
    <div id="app"></div>

    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
          navigator.serviceWorker.register("./sw.js?v=3").catch((err) => {
            console.error("Service worker registration failed:", err);
          });
      }
    </script>
    <script defer src="app.js"></script>
  </body>
</html>
